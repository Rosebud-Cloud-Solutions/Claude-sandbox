<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCS Assistant | Rosebud Cloud Solutions</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="chat-wrapper">
    <header>
      <img src="/static/logo.png" alt="Rosebud Cloud Solutions" class="logo">
      <div class="header-text">
        <h1>RCS Assistant</h1>
        <span class="status">&#9679; Online</span>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="message assistant">
        <p>Hi! I'm the Rosebud Cloud Solutions assistant. I can help you understand
        our cloud, AI, and automation services. What can I help you with today?</p>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask about our services..."
             autocomplete="off" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let conversationHistory = [];

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if (!text) return;

      appendMessage("user", text);
      conversationHistory.push({ role: "user", content: text });
      input.value = "";

      appendMessage("assistant", "...", "typing");

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversationHistory })
        });

        const data = await response.json();
        removeTyping();

        if (data.reply) {
          appendMessage("assistant", data.reply);
          conversationHistory.push({ role: "assistant", content: data.reply });
        } else {
          appendMessage("assistant", "Error: " + (data.error || "Unknown error. Please try again."));
          conversationHistory.pop();
        }
      } catch (err) {
        removeTyping();
        appendMessage("assistant", "Connection error: " + err.message);
        conversationHistory.pop();
      }
    }

    function appendMessage(role, text, id = "") {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      if (id) div.id = id;
      div.innerHTML = role === "assistant" ? renderMarkdown(text) : `<p>${escapeHtml(text)}</p>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderMarkdown(text) {
      // Escape HTML first to prevent XSS, then apply markdown patterns
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

      // Inline bold
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

      const lines = html.split("\n");
      const output = [];
      let inList = false;
      let paraLines = [];

      function flushPara() {
        const content = paraLines.join("<br>").trim();
        if (content) output.push("<p>" + content + "</p>");
        paraLines = [];
      }
      function flushList() {
        if (inList) { output.push("</ul>"); inList = false; }
      }

      for (const line of lines) {
        if (/^### (.+)/.test(line)) {
          flushPara(); flushList();
          output.push("<h3>" + line.replace(/^### /, "") + "</h3>");
        } else if (/^## (.+)/.test(line)) {
          flushPara(); flushList();
          output.push("<h2>" + line.replace(/^## /, "") + "</h2>");
        } else if (/^# (.+)/.test(line)) {
          flushPara(); flushList();
          output.push("<h1>" + line.replace(/^# /, "") + "</h1>");
        } else if (/^---$/.test(line.trim())) {
          flushPara(); flushList();
          output.push("<hr>");
        } else if (/^[-*] (.+)/.test(line)) {
          flushPara();
          if (!inList) { output.push("<ul>"); inList = true; }
          output.push("<li>" + line.replace(/^[-*] /, "") + "</li>");
        } else if (line.trim() === "") {
          flushPara(); flushList();
        } else {
          if (inList) flushList();
          paraLines.push(line);
        }
      }
      flushPara(); flushList();

      return output.join("\n");
    }

    function removeTyping() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    document.getElementById("userInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
