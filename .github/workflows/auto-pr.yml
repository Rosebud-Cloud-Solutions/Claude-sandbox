name: Auto PR

on:
  push:
    branches-ignore:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          BASE="master"

          # Build PR body from commits on this branch not in base
          COMMITS=$(git log origin/${BASE}..HEAD --pretty=format:"- %s" 2>/dev/null || git log HEAD~5..HEAD --pretty=format:"- %s")

          PR_BODY="$(cat <<EOF
          ## Changes
          ${COMMITS}

          ---
          *Auto-generated by push to \`${BRANCH}\`*
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )"

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "${BRANCH}" --base "${BASE}" --json number --jq '.[0].number' 2>/dev/null)

          if [ -n "${EXISTING_PR}" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "${EXISTING_PR}" --body "${PR_BODY}"
          else
            echo "Creating new PR for branch ${BRANCH}"
            # Derive a title from the branch name: strip claude/ prefix and session id suffix
            TITLE=$(echo "${BRANCH}" | sed 's|claude/||' | sed 's/-[A-Z0-9]\{5\}$//' | tr '-' ' ' | sed 's/\b./\u&/g')
            gh pr create \
              --title "${TITLE}" \
              --body "${PR_BODY}" \
              --base "${BASE}" \
              --head "${BRANCH}"
          fi
